name: Build MineCast Installer

on:
  push:
    branches: [main, master]
  workflow_dispatch:        # tombol manual di GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      # 1. Checkout source code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Setup Rust (stable)
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # 4. Cache Rust build artifacts (drastically speeds up subsequent builds)
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # 5. Install Node dependencies
      - name: Install dependencies
        run: npm ci

      # 6. Build Tauri app (frontend + Rust backend + NSIS installer)
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'MineCast v__VERSION__'
          releaseBody: 'MineCast - Monitoring Cuaca Operasional Pertambangan Batu Bara'
          releaseDraft: true
          prerelease: false

      # 7. Upload installer as artifact (available even without a release)
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: MineCast-Windows-Installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30

      # 8. Upload the raw .exe binary as well
      - name: Upload raw binary
        uses: actions/upload-artifact@v4
        with:
          name: MineCast-Binary
          path: src-tauri/target/release/minecast.exe
          retention-days: 30
