name: Build MineCast Installer

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: ./Minecast

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './minecast/src-tauri -> target'

      - name: Install dependencies
        run: npm install

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: './Minecast'
          tagName: v__VERSION__
          releaseName: 'MineCast v__VERSION__'
          releaseBody: 'MineCast - Monitoring Cuaca Pertambangan'
          releaseDraft: true
          prerelease: false

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: MineCast-Windows-Installer
          path: |
            Minecast/src-tauri/target/release/bundle/nsis/*.exe
            Minecast/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30
